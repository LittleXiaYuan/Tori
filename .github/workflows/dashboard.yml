name: Dashboard Build

on:
  push:
    branches: [master, main]
    paths:
      - "heroui-web/**"
  pull_request:
    paths:
      - "heroui-web/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: heroui-web/package-lock.json

      - name: Install dependencies
        run: cd heroui-web && npm ci

      - name: Type check
        run: cd heroui-web && npx tsc --noEmit

      - name: Build
        run: cd heroui-web && npm run build

      - name: Upload build artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-${{ github.sha }}
          path: heroui-web/out/
          retention-days: 7
