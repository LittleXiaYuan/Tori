name: desktop-release

# Builds distributable Tauri desktop installers for all supported desktop OSes.
# This is intentionally separate from baseline CI because Tauri bundling is
# slower and requires platform-specific runners/toolchains.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    name: Package desktop (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            platform_key: windows-amd64
            goos: windows
            goarch: amd64
            binary_ext: .exe
            artifact_name: yunque-desktop-windows-x64
          - label: macos-x64
            os: macos-13
            platform_key: darwin-amd64
            goos: darwin
            goarch: amd64
            binary_ext: ""
            artifact_name: yunque-desktop-macos-x64
          - label: linux-x64
            os: ubuntu-latest
            platform_key: linux-amd64
            goos: linux
            goarch: amd64
            binary_ext: ""
            artifact_name: yunque-desktop-linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev pkg-config

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            apps/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install frontend dependencies
        env:
          HEROUI_AUTH_TOKEN: ${{ secrets.HEROUI_AUTH_TOKEN }}
        run: npm ci --prefer-offline --no-audit --no-fund
        working-directory: apps/web

      - name: Install desktop dependencies
        run: npm ci --prefer-offline --no-audit --no-fund
        working-directory: apps/desktop

      - name: Build Go sidecar for Tauri externalBin
        shell: bash
        run: |
          set -euo pipefail
          out="yunque-agent-${{ matrix.platform_key }}${{ matrix.binary_ext }}"
          echo "Building ${out}"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-s -w" -o "${out}" ./cmd/agent

      - name: Build Tauri desktop bundle
        env:
          HEROUI_AUTH_TOKEN: ${{ secrets.HEROUI_AUTH_TOKEN }}
          # Updater signing. The private key lives ONLY in repo secrets — never
          # in the tree. With createUpdaterArtifacts:true the bundler emits a
          # signed `.sig` next to each installer; without these vars the signing
          # step fails, so a release build enforces that updates are signed.
          # Add the secret with the private key printed by `tauri signer generate`.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run build
        working-directory: apps/desktop

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/**/*
          if-no-files-found: error

      # ── Self-hosted updater distribution (manual for now) ──────────────────
      # The updater endpoint in tauri.conf.json points at self-hosted static
      # storage. To wire the full auto-update loop, after this workflow uploads
      # the signed bundles you must:
      #   1. Collect the signed installer + its `.sig` for each platform from
      #      the target/release/bundle/** artifacts.
      #   2. Build a `latest.json` Tauri update manifest (version, notes, pub_date,
      #      and per-platform { signature, url }) — the signature is the `.sig`
      #      contents, the url points at the installer on your CDN.
      #   3. Upload the installers + latest.json to the CDN path that the
      #      endpoint URL resolves to (replace the REPLACE-WITH-YOUR-CDN
      #      placeholder in tauri.conf.json first).
      # This step is intentionally left as a documented manual process until the
      # CDN target is chosen; automate it here once the bucket/credentials exist.
