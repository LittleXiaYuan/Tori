[package]
name = "yunque-client"
version = "0.1.0"
edition = "2021"
description = "Rust client for the Yunque (云雀) Agent HTTP API. Auto-generated from docs/openapi.yaml."
license = "Apache-2.0"
publish = false

[dependencies]
progenitor-client = "0.10"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream", "multipart"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["serde", "v4"] }
futures = "0.3"
bytes = "1"
base64 = "0.22"
http = "1"

[build-dependencies]
openapiv3 = "2"
prettyplease = "0.2"
progenitor = "0.10"
serde_yaml = "0.9"
serde_json = "1"
syn = "2"
