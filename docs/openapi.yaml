    /v1/cognis:
        get:
            tags:
                - cognis
            summary: List every registered Cogni declaration
            operationId: list_cognis
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                type: object
                "400":
                    description: Bad request
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                "401":
                    description: Unauthorized
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                "500":
                    description: Internal error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
            security:
                - BearerAuth: []
        post:
            tags:
                - cognis
            summary: Add an inline Cogni declaration (JSON body)
            operationId: create_cogni
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            description: Cogni declaration. Same shape as a cogni.yaml file — see pkg/cogni for the full struct.
                            properties:
                                activation:
                                    additionalProperties: true
                                    description: ActivationRules (when this Cogni engages).
                                    type: object
                                capsule:
                                    description: Capsule (persona) this Cogni binds to. Empty for free-standing routing policies.
                                    type: string
                                checks:
                                    description: Activation self-tests.
                                    items:
                                        additionalProperties: true
                                        type: object
                                    type: array
                                context:
                                    additionalProperties: true
                                    description: ContextInjection (extra text added to the system prompt).
                                    type: object
                                description:
                                    type: string
                                display_name:
                                    type: string
                                economics:
                                    additionalProperties: true
                                    description: Per-Cogni budget / cost limits.
                                    type: object
                                exclusive:
                                    description: If non-empty, only one Cogni with this exclusive-group may activate per turn.
                                    type: string
                                experience:
                                    additionalProperties: true
                                    type: object
                                id:
                                    description: Unique Cogni id (also used as filename).
                                    type: string
                                mcp:
                                    additionalProperties: true
                                    description: MCPConfig (per-Cogni MCP server connections + tool filters).
                                    type: object
                                memory:
                                    additionalProperties: true
                                    type: object
                                priority:
                                    default: 100
                                    description: Tie-break multiple activated Cognis (lower = higher priority).
                                    type: integer
                                surface:
                                    additionalProperties: true
                                    description: ToolSurface (which tools/capabilities are exposed).
                                    type: object
                                workflows:
                                    description: Multi-step workflows.
                                    items:
                                        additionalProperties: true
                                        type: object
                                    type: array
                            required:
                                - id
                            type: object
            responses:
                "200":
                    description: Cogni declaration accepted.
                    content:
                        application/json:
                            schema:
                                properties:
                                    id:
                                        type: string
                                    status:
                                        enum:
                                            - ok
                                        type: string
                                type: object
                "400":
                    description: Bad request
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                "401":
                    description: Unauthorized
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                "500":
                    description: Internal error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
            security:
                - BearerAuth: []
