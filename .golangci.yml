version: "2"
run:
  go: "1.25"
  tests: true
linters:
  enable:
    - cyclop
    - gocyclo
    - gosec
    - misspell
    - prealloc
  disable:
    - depguard
    - godox
    - lll
  settings:
    cyclop:
      max-complexity: 30
    errcheck:
      exclude-functions:
        - (*log/slog.Logger).Info
        - (*log/slog.Logger).Warn
        - (*log/slog.Logger).Error
        - encoding/json.NewEncoder.Encode
        - io.Copy
        - (net/http.ResponseWriter).Write
        - (*os.File).Close
    gocyclo:
      min-complexity: 30
    gosec:
      excludes:
        - G104
        - G304
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - cyclop
          - errcheck
          - gocyclo
          - gosec
        path: _test\.go
      - linters:
          - all
        path: .*\.gen\.go
      - linters:
          - cyclop
          - gocyclo
        path: cmd/agent/init_.*\.go
      - linters:
          - cyclop
          - gocyclo
        path: internal/controlplane/gateway/gateway\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 50
  max-same-issues: 5
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
