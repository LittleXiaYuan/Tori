<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1120;
      --panel: rgba(15, 23, 42, 0.96);
      --panel-soft: rgba(30, 41, 59, 0.78);
      --border: rgba(148, 163, 184, 0.18);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --brand: #60a5fa;
      --brand-strong: #3b82f6;
      --success: #34d399;
      --warn: #f59e0b;
      --danger: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 360px;
      background: radial-gradient(circle at top, rgba(59,130,246,0.22), transparent 40%), var(--bg);
      color: var(--text);
      font: 13px/1.45 Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 14px;
    }
    .stack { display: flex; flex-direction: column; gap: 12px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.28);
    }
    .header { display: flex; align-items: center; justify-content: space-between; }
    .title { font-size: 15px; font-weight: 700; }
    .pill {
      display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px;
      background: rgba(59,130,246,0.14); color: #bfdbfe; font-size: 11px; font-weight: 600;
    }
    .dot { width: 8px; height: 8px; border-radius: 999px; background: #64748b; }
    .dot.on { background: var(--success); box-shadow: 0 0 10px rgba(52,211,153,0.55); }
    .dot.off { background: #64748b; }
    .dot.warn { background: var(--warn); box-shadow: 0 0 10px rgba(245,158,11,0.45); }
    .meta { color: var(--muted); font-size: 12px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; }
    input {
      width: 100%; border: 1px solid rgba(148,163,184,.18); background: rgba(15,23,42,.9); color: var(--text);
      border-radius: 12px; padding: 10px 12px; outline: none;
    }
    input:focus { border-color: rgba(96,165,250,.8); box-shadow: 0 0 0 3px rgba(96,165,250,.15); }
    button {
      border: none; border-radius: 12px; padding: 10px 12px; cursor: pointer; font-weight: 700;
      transition: transform .16s ease, opacity .16s ease, background .16s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .55; cursor: wait; transform: none; }
    .primary { background: linear-gradient(135deg, var(--brand), var(--brand-strong)); color: white; }
    .secondary { background: rgba(30,41,59,.95); color: var(--text); border: 1px solid var(--border); }
    .warn { background: rgba(245,158,11,.18); color: #fde68a; border: 1px solid rgba(245,158,11,.28); }
    .danger { background: rgba(248,113,113,.16); color: #fecaca; border: 1px solid rgba(248,113,113,.28); }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }
    .hint { color: var(--muted); font-size: 12px; }
    .account {
      border-radius: 14px; padding: 12px; background: linear-gradient(180deg, rgba(30,41,59,.95), rgba(15,23,42,.88));
      border: 1px solid rgba(96,165,250,.16);
    }
    .account strong { display: block; font-size: 13px; }
    .status-line { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .tabs { max-height: 144px; overflow: auto; display: flex; flex-direction: column; gap: 6px; }
    .tab-item {
      display: flex; align-items: center; gap: 8px; background: rgba(15,23,42,.8); border: 1px solid transparent;
      border-radius: 12px; padding: 8px 10px; cursor: pointer;
    }
    .tab-item.active { border-color: rgba(96,165,250,.36); background: rgba(30,41,59,.95); }
    .tab-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    details { border-top: 1px solid var(--border); padding-top: 12px; }
    summary { cursor: pointer; color: var(--muted); font-weight: 700; }
    .error { color: #fca5a5; font-size: 12px; }
    .credential-banner {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(245,158,11,0.45);
      background: rgba(245,158,11,0.12);
      color: #fde68a;
      font-size: 12px;
      line-height: 1.45;
    }
    .credential-banner strong { color: #fff; }
    .import-hero {
      margin-top: 10px;
      padding: 12px;
      border-radius: 14px;
      background: linear-gradient(145deg, rgba(59,130,246,0.12), rgba(99,102,241,0.08));
      border: 1px solid rgba(96,165,250,0.22);
    }
    .import-hero .import-title { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
    .import-hero .import-sub { font-size: 11px; color: var(--muted); line-height: 1.4; margin-bottom: 10px; }
    .btn-block { width: 100%; }
    details.optional-block { border-top: none; padding-top: 0; margin-top: 0; }
    details.optional-block > summary {
      list-style: none;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0 6px;
      font-size: 12px; color: var(--muted);
    }
    details.optional-block > summary::-webkit-details-marker { display: none; }
    details.optional-block > summary::after {
      content: "▾"; font-size: 10px; opacity: 0.7;
      display: inline-block; transition: transform 0.15s ease;
    }
    details.optional-block[open] > summary::after { transform: rotate(180deg); }
    .divider {
      height: 1px; background: var(--border); margin: 12px 0;
    }
  </style>
</head>
<body>
  <div class="stack">
    <div class="card">
      <div class="header">
        <div>
          <div class="title">Yunque Browser</div>
          <div class="meta">云雀真实浏览器桥接</div>
        </div>
        <div class="pill"><span id="statusDot" class="dot off"></span><span id="statusText">Offline</span></div>
      </div>
      <div class="meta" id="connectionMeta" style="margin-top:8px;"></div>
      <div class="error" id="errorText" style="display:none; margin-top:8px;"></div>
    </div>

    <div class="card">
      <div class="title" style="font-size:14px;">本机连接</div>
      <div class="hint" style="margin-top:4px;">先在本机打开云雀 Web（localhost）并登录，再一键导入；或手动填写。</div>
      <div class="credential-banner" id="credentialBanner" style="display:none;">
        <strong>需要凭证</strong>：点下方 <strong>从云雀页面导入</strong>，或展开「手动填写 API Key」，或使用可选的 Tori。
      </div>
      <div class="import-hero">
        <div class="import-title">从云雀页面导入</div>
        <div class="import-sub">保持云雀标签页为当前页，点击后读取该页的登录信息（API Key 或 JWT），无需手抄。</div>
        <button class="primary btn-block" type="button" id="importFromTabBtn">从云雀页面导入</button>
      </div>
      <div class="field" style="margin-top:12px;">
        <label class="label" for="wsUrl">Agent WebSocket</label>
        <input type="text" id="wsUrl" placeholder="ws://localhost:9090/ws/browser">
      </div>
      <div class="divider"></div>
      <details id="apiKeyDetails" style="margin-top:0;">
        <summary>手动填写 API Key</summary>
        <div class="field" style="margin-top:10px;">
          <label class="label" for="apiKey">API Key</label>
          <input type="password" id="apiKey" placeholder="从云雀 Web → 设置 复制">
        </div>
      </details>
      <div class="row" style="margin-top:12px;">
        <button class="primary" id="connectBtn">保存并连接</button>
        <button class="secondary" id="reconnectBtn">重连</button>
      </div>
      <div class="row" style="margin-top:8px;">
        <button class="secondary" id="markBtn">标记元素</button>
        <button class="secondary" id="resumeBtn">恢复 AI</button>
      </div>
    </div>

    <details class="card optional-block" id="toriDetails">
      <summary>Tori 云端（可选）</summary>
      <div class="field" style="margin-top:4px;">
        <label class="label" for="toriApiBase">Tori API Base</label>
        <input type="text" id="toriApiBase" placeholder="http://localhost:9090">
      </div>
      <div class="account" id="accountCard" style="display:none; margin-top:12px;">
        <strong id="accountName">Not signed in</strong>
        <span class="meta" id="accountMeta"></span>
      </div>
      <div class="row" style="margin-top:12px;">
        <button class="primary" id="connectToriBtn">登录 Tori</button>
        <button class="danger" id="disconnectToriBtn">退出</button>
      </div>
      <div class="hint" style="margin-top:10px;">服务端需配置 <code>TORI_API_BASE_URL</code> 以校验令牌。</div>
    </details>

    <div class="card">
      <div class="status-line">
        <div class="title" style="font-size:14px;">当前窗口标签</div>
        <span class="meta" id="sessionCount"></span>
      </div>
      <div class="tabs" id="tabList" style="margin-top:10px;"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
