<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>云雀 Agent</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      text-align: center;
      padding: 3rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    p {
      color: #888;
      margin-bottom: 1.5rem;
    }

    a {
      color: #3b82f6;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    code {
      background: #1a1a1a;
      padding: 0.2em 0.5em;
      border-radius: 4px;
      font-size: 0.9em;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>云雀 Agent</h1>
    <p>控制面板尚未构建</p>
    <p>运行 <code>cd apps/web && npm install && npm run build</code> 然后重启服务</p>
    <p><a href="/healthz">API Health Check →</a></p>
  </div>
</body>

</html>
